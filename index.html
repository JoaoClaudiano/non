<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fortaleza em Fluxo — Atlas do Tráfego</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://leaflet.github.io/Leaflet.heat/dist/leaflet-heat.js"></script>

<style>
:root {
  --bg: #f3f0e8; --surface: #fdfcf7; --border: rgba(50, 40, 20, 0.12);
  --ink: #18140c; --terra: #c2410c; --verde: #16a34a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
nav { height: 65px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 1.5rem; z-index: 1000; }
.logo { display: flex; align-items: center; gap: 10px; font-family: 'DM Serif Display', serif; font-size: 1.2rem; }
.logo-box { background: var(--terra); color: #fff; padding: 4px 8px; border-radius: 4px; }

/* MAPA */
.main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }
#map { flex: 1; z-index: 1; }

/* SIDEBAR / BOTTOM SHEET */
.sidebar { 
  width: 420px; background: var(--surface); border-left: 1px solid var(--border); 
  padding: 2rem; overflow-y: auto; transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000;
}
.btn-close { display: none; background: #eee; border: none; padding: 8px 15px; border-radius: 20px; font-weight: 700; cursor: pointer; margin-bottom: 20px; }

@media (max-width: 768px) {
  .sidebar { position: absolute; bottom: 0; left: 0; width: 100%; height: 70%; transform: translateY(100%); border-radius: 24px 24px 0 0; box-shadow: 0 -10px 40px rgba(0,0,0,0.1); }
  .sidebar.active { transform: translateY(0); }
  .btn-close { display: block; }
}

/* CARDS */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
.kpi-card { background: var(--bg); padding: 16px; border-radius: 12px; border-bottom: 4px solid var(--terra); }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: #777; margin-bottom: 5px; }
.kpi-value { font-size: 1.4rem; font-weight: 700; }

#historyChart { width: 100%; height: 220px; margin-top: 20px; }
</style>
</head>
<body>

<nav>
  <div class="logo">
    <div class="logo-box">FF</div>
    <span>FORTALEZA EM FLUXO</span>
  </div>
  <div id="status" style="font-size: 11px; font-weight: 600; color: var(--terra);">SINCRO: JUNHO/2025</div>
</nav>

<div class="main-layout">
  <div id="map"></div>
  
  <aside class="sidebar" id="sidebar">
    <button class="btn-close" onclick="toggleSidebar(false)">FECHAR</button>
    
    <div id="intro">
      <h2 style="font-family:'DM Serif Display'; font-size: 2rem; margin-bottom: 10px;">Atlas Volumétrico</h2>
      <p style="color: #666; line-height: 1.6;">O mapa de calor destaca as zonas de maior pressão de tráfego. Selecione um sensor para analisar o comportamento dos últimos 12 meses.</p>
    </div>

    <div id="data-pane" style="display:none">
      <h2 id="view-via" style="font-family:'DM Serif Display'; font-size: 1.8rem; line-height: 1.1; margin-bottom: 10px;"></h2>
      <p id="view-sitio" style="font-size: 11px; color: #888; margin-bottom: 20px;"></p>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Volume Atual</div>
          <div class="kpi-value" id="view-vmd"></div>
        </div>
        <div class="kpi-card" style="border-bottom-color: var(--verde);">
          <div class="kpi-label">Média Anual</div>
          <div class="kpi-value" id="view-avg"></div>
        </div>
      </div>

      <div style="height: 250px;"><canvas id="historyChart"></canvas></div>
    </div>
  </aside>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map = L.map('map', { zoomControl: false }).setView([-3.76, -38.51], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let chart = null;
let allData = [];
let heatLayer = null;

// CARREGAR CSV
Papa.parse('dadosabertos_volumetrafegomensal.csv', {
  download: true, header: true, dynamicTyping: true,
  complete: function(results) {
    allData = results.data.filter(d => d.Lat && d.Lon);
    initMap();
  }
});

function initMap() {
  const currentMonth = allData.filter(d => d.DATA === '2025-06');
  
  // 1. CRIAR MAPA DE CALOR
  // Formato: [lat, lon, intensidade]
  const heatPoints = currentMonth.map(p => [p.Lat, p.Lon, p.VMD / 5000]); 
  heatLayer = L.heatLayer(heatPoints, {
    radius: 25, blur: 15, maxZoom: 17,
    gradient: {0.4: 'blue', 0.6: 'lime', 0.8: 'yellow', 1: 'red'}
  }).addTo(map);

  // 2. CRIAR PONTOS INTERATIVOS
  currentMonth.forEach(p => {
    const marker = L.circleMarker([p.Lat, p.Lon], {
      radius: 6, color: '#fff', weight: 1, fillColor: 'transparent', fillOpacity: 0
    }).addTo(map);

    marker.on('click', () => showDetails(p));
  });
}

function showDetails(p) {
  const history = allData.filter(d => d.Sitio === p.Sitio).sort((a,b) => a.DATA.localeCompare(b.DATA));
  const avg = history.reduce((sum, val) => sum + val.VMD, 0) / history.length;

  document.getElementById('intro').style.display = 'none';
  document.getElementById('data-pane').style.display = 'block';
  document.getElementById('view-via').innerText = p.ViaSentido.split('[')[0];
  document.getElementById('view-sitio').innerText = `SÍTIO DE MONITORIZAÇÃO: ${p.Sitio}`;
  document.getElementById('view-vmd').innerText = p.VMD.toLocaleString();
  document.getElementById('view-avg').innerText = Math.round(avg).toLocaleString();

  if(window.innerWidth < 768) toggleSidebar(true);
  renderChart(history);
}

function renderChart(history) {
  const ctx = document.getElementById('historyChart').getContext('2d');
  if(chart) chart.destroy();
  
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map(h => h.DATA),
      datasets: [{
        label: 'VMD Mensal',
        data: history.map(h => h.VMD),
        borderColor: '#c2410c',
        backgroundColor: 'rgba(194, 65, 12, 0.1)',
        fill: true, tension: 0.3, pointRadius: 4
      }]
    },
    options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
  });
}

function toggleSidebar(open) {
  document.getElementById('sidebar').classList.toggle('active', open);
}
</script>
</body>
</html>
