<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Fortaleza em Fluxo — Atlas do Tráfego</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<style>
:root {
  --bg: #f3f0e8; --surface: #fdfcf7; --border: rgba(50, 40, 20, 0.12);
  --ink: #18140c; --ink-mid: #5a4e38; --terra-main: #c2410c; --terra-faint: #ffedd5;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--ink); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
nav { display: flex; align-items: center; padding: 0 1.5rem; height: 60px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 1000; flex-shrink: 0; }
.nav-mark { width: 32px; height: 32px; background: var(--terra-main); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--surface); font-family: 'DM Serif Display', serif; margin-right: 12px; }

/* LAYOUT */
.app-container { display: flex; flex: 1; overflow: hidden; position: relative; }
#map { flex: 1; height: 100%; z-index: 1; }

/* SIDEBAR RESPONSIVA */
.sidebar { 
  width: 380px; background: var(--surface); border-left: 1px solid var(--border); 
  padding: 2rem; overflow-y: auto; z-index: 100; transition: transform 0.3s ease;
}

.kpi-card { padding: 1.2rem; background: var(--bg); border-radius: 12px; border-left: 4px solid var(--terra-main); margin-bottom: 1rem; }
.kpi-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--ink-mid); letter-spacing: 0.1em; }
.kpi-value { font-size: 1.6rem; font-weight: 700; margin: 4px 0; }

/* MOBILE ADJUSTMENTS */
@media (max-width: 768px) {
  .app-container { flex-direction: column; }
  .sidebar { 
    width: 100%; height: 40%; position: absolute; bottom: 0; left: 0; 
    border-left: none; border-top: 1px solid var(--border); border-radius: 20px 20px 0 0;
    padding: 1.5rem; box-shadow: 0 -10px 30px rgba(0,0,0,0.08); transform: translateY(100%);
  }
  .sidebar.active { transform: translateY(0); }
  #map { height: 60%; }
}

.status-bar { font-size: 10px; padding: 8px 1.5rem; background: var(--surface); border-top: 1px solid var(--border); color: var(--ink-mid); }
</style>
</head>
<body>

<nav>
  <div class="nav-mark">FF</div>
  <div style="font-weight: 700; font-size: 14px;">FORTALEZA EM FLUXO</div>
</nav>

<div class="app-container">
  <div id="map"></div>
  
  <aside class="sidebar" id="sidebar">
    <div id="panel-empty" style="text-align: center; padding: 20px 0;">
      <p style="color: var(--ink-mid); font-size: 0.9rem;">Toque em um ponto no mapa</p>
    </div>

    <div id="panel-data" style="display: none;">
      <h2 id="val-via" style="font-family:'DM Serif Display',serif; font-size: 1.4rem; margin-bottom: 15px;"></h2>
      <div class="kpi-card">
        <div class="kpi-label">VMD (Jun/2025)</div>
        <div class="kpi-value" id="val-vmd"></div>
      </div>
      <div style="font-size: 0.8rem; padding: 12px; background: var(--terra-faint); border-radius: 8px;">
        <strong>Sítio:</strong> <span id="val-sitio"></span>
      </div>
    </div>
  </aside>
</div>

<div class="status-bar" id="status-bar">Carregando dados...</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let map = L.map('map', { zoomControl: false }).setView([-3.76, -38.51], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

function carregarDados() {
  Papa.parse('dadosabertos_volumetrafegomensal.csv', {
    download: true, header: true, dynamicTyping: true,
    complete: function(results) {
      const recentes = results.data.filter(d => d.DATA === '2025-06' && d.Lat);
      pontosNoMapa(recentes);
      document.getElementById('status-bar').innerText = `Pronto: ${recentes.length} sensores ativos.`;
    }
  });
}

function pontosNoMapa(pontos) {
  pontos.forEach(p => {
    let cor = p.VMD > 40000 ? '#c2410c' : (p.VMD > 20000 ? '#d97706' : '#65a30d');
    const marker = L.circleMarker([p.Lat, p.Lon], {
      radius: 7, fillColor: cor, color: '#fff', weight: 2, fillOpacity: 0.9
    }).addTo(map);

    marker.on('click', () => {
      document.getElementById('panel-empty').style.display = 'none';
      document.getElementById('panel-data').style.display = 'block';
      document.getElementById('val-via').innerText = p.ViaSentido;
      document.getElementById('val-vmd').innerText = p.VMD.toLocaleString();
      document.getElementById('val-sitio').innerText = p.Sitio;
      
      const sb = document.getElementById('sidebar');
      sb.classList.add('active'); // Abre no mobile
    });
  });
}

carregarDados();
</script>
</body>
</html>
